kind = "web"
previewPath = "/"
title = "Royal Pulse"
version = "1.0.0"
id = "artifacts/royal-pulse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20862

[services.development]
run = "pnpm --filter @workspace/royal-pulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-pulse", "run", "build" ]
serve = "static"
publicDir = "artifacts/royal-pulse/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20862"
BASE_PATH = "/"
